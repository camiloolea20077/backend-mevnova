spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración del servidor
server.port=${SERVER_PORT}
#
#
# Configuración de JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
app.jwt.secret=WnBtQ0xXaE9WSlR6eENaUFRvU3V1ZGk0V0w2RjJQUWtla1RvSkZkQk50SkxWNHFobm80R05kaWlFb0U4clR6QQ==
app.jwt.expiration-milliseconds=259200000

# JWT Multi-Tenant
jwt.secret=${JWT_SECRET:WnBtQ0xXaE9WSlR6eENaUFRvU3V1ZGk0V0w2RjJQUWtla1RvSkZkQk50SkxWNHFobm80R05kaWlFb0U4clR6QQ==}
jwt.pre-auth.expiration-seconds=300
jwt.session.expiration-seconds=600
jwt.access.expiration-seconds=86400
jwt.refresh.expiration-seconds=2592000
jwt.password-change.expiration-seconds=900

# Security
security.bcrypt-strength=12
security.max-failed-attempts=5
security.password-history-size=3
security.rate-limit.pre-auth-per-ip-minute=10
app.aes.key=b7e230b35e5b379f03d51f7453f4ae3b3b71a0a0181e78b4d2f18943b05c09d6f1c4c4a6340e33d9c01d97f6f1487b4df4f64cc0384146c734ddcd78b9b7c7f7

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.cloud_tecnological.mednova.controller
springdoc.show-actuator=false

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
